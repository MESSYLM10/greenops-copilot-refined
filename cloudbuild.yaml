###############################################################################
# GreenOps Copilot — Cloud Build CI/CD Pipeline
#
# Correct execution order (solves the chicken-and-egg problem):
#
#   1. Tests (parallel)
#   2. Build orchestrator + executor images (parallel)
#   3. Push orchestrator + executor
#   4. Terraform apply  ← uses those images; creates all infra incl. Cloud Run
#   5. Extract orchestrator URL from terraform output
#   6. Build frontend with REAL orchestrator URL baked in
#   7. Push frontend
#   8. Update frontend Cloud Run to use the new frontend image
#   9. Smoke test
#
# Run manually from Cloud Shell:
#   gcloud builds submit . \
#     --config=cloudbuild.yaml \
#     --substitutions=SHORT_SHA=$(git rev-parse --short HEAD),_REGION=us-central1
###############################################################################

steps:

  # ── 1. Python unit tests ─────────────────────────────────────────────────────
  - id: test-orchestrator
    name: python:3.12-slim
    entrypoint: bash
    args:
      - -c
      - |
        pip install -q -r backend/requirements.txt
        python -m pytest backend/tests/ -v --tb=short
    waitFor: ["-"]

  # ── 2a. Build orchestrator image ─────────────────────────────────────────────
  - id: build-orchestrator
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/greenops-copilot/orchestrator:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/greenops-copilot/orchestrator:latest
      - -f
      - backend/Dockerfile
      - backend/
    waitFor: [test-orchestrator]

  # ── 2b. Build executor image (parallel with orchestrator) ────────────────────
  - id: build-executor
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/greenops-copilot/executor:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/greenops-copilot/executor:latest
      - -f
      - executor/Dockerfile
      - executor/
    waitFor: ["-"]

  # ── 3. Push orchestrator + executor ──────────────────────────────────────────
  - id: push-orchestrator
    name: gcr.io/cloud-builders/docker
    args: [push, "--all-tags", "${_REGION}-docker.pkg.dev/$PROJECT_ID/greenops-copilot/orchestrator"]
    waitFor: [build-orchestrator]

  - id: push-executor
    name: gcr.io/cloud-builders/docker
    args: [push, "--all-tags", "${_REGION}-docker.pkg.dev/$PROJECT_ID/greenops-copilot/executor"]
    waitFor: [build-executor]

  # ── 4. Terraform init → plan → apply ─────────────────────────────────────────
  # Images for orchestrator + executor now exist in Artifact Registry.
  # Frontend Cloud Run is deployed with a temporary placeholder (nginx:alpine).
  # Terraform is idempotent — safe to re-run on every build.
  - id: tf-init
    name: hashicorp/terraform:1.7
    entrypoint: sh
    args:
      - -c
      - |
        cd terraform
        terraform init \
          -backend-config="bucket=$PROJECT_ID-tfstate" \
          -backend-config="prefix=greenops-copilot/state" \
          -input=false -upgrade
    waitFor: [push-orchestrator, push-executor]

  - id: tf-plan
    name: hashicorp/terraform:1.7
    entrypoint: sh
    args:
      - -c
      - |
        cd terraform
        terraform plan \
          -var="project_id=$PROJECT_ID" \
          -var="primary_region=${_REGION}" \
          -var="image_tag=$SHORT_SHA" \
          -out=/workspace/tfplan \
          -input=false
    waitFor: [tf-init]

  - id: tf-apply
    name: hashicorp/terraform:1.7
    entrypoint: sh
    args:
      - -c
      - cd terraform && terraform apply -input=false /workspace/tfplan
    waitFor: [tf-plan]

  # ── 5. Extract orchestrator URL ───────────────────────────────────────────────
  - id: extract-urls
    name: hashicorp/terraform:1.7
    entrypoint: sh
    args:
      - -c
      - |
        cd terraform
        ORCHESTRATOR_URL=$(terraform output -raw orchestrator_url)
        FRONTEND_URL=$(terraform output -raw frontend_url)
        echo "ORCHESTRATOR_URL=$ORCHESTRATOR_URL" > /workspace/urls.env
        echo "FRONTEND_URL=$FRONTEND_URL" >> /workspace/urls.env
        echo "Orchestrator: $ORCHESTRATOR_URL"
        echo "Frontend:     $FRONTEND_URL"
    waitFor: [tf-apply]

  # ── 6. Build frontend with REAL orchestrator URL baked in ────────────────────
  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    entrypoint: sh
    args:
      - -c
      - |
        source /workspace/urls.env
        docker build \
          -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/greenops-copilot/frontend:$SHORT_SHA \
          -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/greenops-copilot/frontend:latest \
          --build-arg REACT_APP_ORCHESTRATOR_URL=$ORCHESTRATOR_URL \
          -f frontend/Dockerfile \
          frontend/
    waitFor: [extract-urls]

  # ── 7. Push frontend ──────────────────────────────────────────────────────────
  - id: push-frontend
    name: gcr.io/cloud-builders/docker
    args: [push, "--all-tags", "${_REGION}-docker.pkg.dev/$PROJECT_ID/greenops-copilot/frontend"]
    waitFor: [build-frontend]

  # ── 8. Update frontend Cloud Run to use the newly built image ─────────────────
  - id: deploy-frontend
    name: gcr.io/cloud-builders/gcloud
    entrypoint: sh
    args:
      - -c
      - |
        gcloud run services update greenops-frontend \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/greenops-copilot/frontend:$SHORT_SHA \
          --region=${_REGION} \
          --project=$PROJECT_ID
    waitFor: [push-frontend]

  # ── 9. Smoke test ─────────────────────────────────────────────────────────────
  - id: smoke-test
    name: curlimages/curl:latest
    entrypoint: sh
    args:
      - -c
      - |
        source /workspace/urls.env
        echo "Smoke testing $ORCHESTRATOR_URL/health ..."
        for i in $(seq 1 12); do
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$ORCHESTRATOR_URL/health" 2>/dev/null || echo "000")
          echo "  attempt $i/12 — HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Smoke test PASSED."
            echo "Frontend: $FRONTEND_URL"
            exit 0
          fi
          sleep 5
        done
        echo "Smoke test FAILED after 12 attempts."
        exit 1
    waitFor: [deploy-frontend]

substitutions:
  _REGION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  dynamic_substitutions: true

timeout: 2400s   # 40 min — React build takes ~5 min in Cloud Build

artifacts:
  objects:
    location: gs://$PROJECT_ID-build-artifacts/$BUILD_ID/
    paths:
      - /workspace/tfplan
      - /workspace/urls.env
